<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Main gradient for Activiti brand -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    
    <!-- Secondary gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker for flow lines -->
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="url(#mainGradient)"/>
    </marker>
    
    <!-- Drop shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="15" y="15" width="370" height="370" rx="60" ry="60" 
        fill="url(#bgGradient)" 
        stroke="url(#mainGradient)" 
        stroke-width="4"
        filter="url(#softShadow)"/>
  
  <!-- BPMN Flow - Start Event -->
  <g transform="translate(80, 200)">
    <circle r="28" fill="white" stroke="url(#mainGradient)" stroke-width="3" filter="url(#softShadow)"/>
    <circle r="12" fill="url(#mainGradient)" opacity="0.85"/>
  </g>
  
  <!-- Flow Line 1: Start to Task -->
  <line x1="108" y1="200" x2="145" y2="200" 
        stroke="url(#mainGradient)" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        marker-end="url(#flowArrow)"/>
  
  <!-- BPMN User Task (rounded rectangle) -->
  <g transform="translate(155, 160)">
    <rect width="70" height="80" rx="10" ry="10" 
          fill="white" 
          stroke="url(#mainGradient)" 
          stroke-width="3"
          filter="url(#softShadow)"/>
    <!-- User icon inside task -->
    <circle cx="35" cy="28" r="10" fill="none" stroke="url(#mainGradient)" stroke-width="2.5"/>
    <path d="M35,42 Q20,55 35,65 Q50,55 35,42" fill="none" stroke="url(#mainGradient)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Flow Line 2: Task to End -->
  <line x1="225" y1="200" x2="262" y2="200" 
        stroke="url(#mainGradient)" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        marker-end="url(#flowArrow)"/>
  
  <!-- BPMN End Event -->
  <g transform="translate(280, 200)">
    <circle r="28" fill="white" stroke="url(#mainGradient)" stroke-width="5" filter="url(#softShadow)"/>
    <circle r="14" fill="url(#mainGradient)" opacity="0.9"/>
  </g>
  
  <!-- Decorative inner border -->
  <rect x="30" y="30" width="340" height="340" rx="50" ry="50" 
        fill="none" 
        stroke="url(#mainGradient)" 
        stroke-width="2" 
        opacity="0.25"/>
</svg>
