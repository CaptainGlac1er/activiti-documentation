<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="activitiGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6DB33F"/>
      <stop offset="100%" stop-color="#5C9F3E"/>
    </linearGradient>
  </defs>

  <!-- App Background (Subtle green tint for cohesion) -->
  <rect x="0" y="0" width="120" height="120" fill="#F5F9F3" rx="16"/>

  <!-- BPMN Shapes (Drawn first) -->
  <circle cx="24" cy="60" r="8" fill="none" stroke="#5C9F3E" stroke-width="2.5"/>
  <rect x="44" y="48" width="32" height="24" rx="5" fill="#5C9F3E"/>
  <circle cx="96" cy="60" r="8" fill="none" stroke="#4A802A" stroke-width="4"/>

  <!-- User Icon inside Task -->
  <circle cx="60" cy="54" r="3.5" fill="#FFFFFF"/>
  <path d="M54 63 Q60 56 66 63" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Connection Lines -->
  <line x1="32" y1="60" x2="40" y2="60" stroke="#5C9F3E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="60" x2="84" y2="60" stroke="#5C9F3E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrowheads (Drawn last to sit cleanly on edges) -->
  <polygon points="44,60 40,55 40,65" fill="#5C9F3E" stroke-linejoin="round"/>
  <polygon points="88,60 84,55 84,65" fill="#5C9F3E" stroke-linejoin="round"/>
</svg>