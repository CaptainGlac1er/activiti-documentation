spring:
  application:
    name: order-management-workflow
  
  datasource:
    url: jdbc:h2:mem:ordermanagement
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  activiti:
    bpmn-enable-history-level: full
    db-schema-update: true
    async-executor-activate: true
    deployment-enabled: true

logging:
  level:
    org.activiti: INFO
    com.example.ordermanagement: DEBUG

# External service configurations
services:
  credit-bureau:
    api-url: https://api.creditbureau.com/v1
    timeout: 30000
  
  payment:
    gateway: https://api.stripe.com/v1
    api-key: ${STRIPE_API_KEY:sk_test_placeholder}
    timeout: 30000
  
  inventory:
    system-url: https://inventory.company.com/api
    min-stock-threshold: 10
  
  shipping:
    provider: fedex
    api-url: https://api.fedex.com/v1
  
  email:
    smtp-server: smtp.company.com
    from-address: orders@company.com
